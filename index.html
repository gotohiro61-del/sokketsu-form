<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>即決予約システム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #f0f2f5;
    color: #333;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 12px;
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: white;
    padding: 18px 16px;
    border-radius: 14px;
    margin-bottom: 14px;
    text-align: center;
  }
  .header h1 { font-size: 17px; font-weight: 700; }
  .header .badge {
    display: inline-block;
    background: rgba(255,255,255,0.25);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 13px;
    margin-top: 6px;
  }

  /* Steps indicator */
  .steps {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .step-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ddd;
  }
  .step-dot.active { background: #1a73e8; width: 28px; border-radius: 5px; }

  /* Section */
  .section {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: #1a73e8;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding-bottom: 8px;
    border-bottom: 2px solid #e8f0fe;
  }

  /* Info rows */
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f5f5f5;
    font-size: 14px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: #999; font-size: 13px; }
  .info-value { font-weight: 600; text-align: right; max-width: 60%; }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: #444;
    margin-bottom: 6px;
  }
  .form-group label .req {
    color: #d32f2f;
    font-size: 11px;
    margin-left: 4px;
  }
  .form-group input,
  .form-group select {
    width: 100%;
    padding: 14px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    background: #fafafa;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: #1a73e8;
    background: white;
  }
  .form-group input.disabled {
    background: #f0f0f0;
    color: #999;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* Booking block */
  .booking-block {
    border: 2px solid #e8eaed;
    border-radius: 14px;
    padding: 18px 14px 14px;
    margin-bottom: 12px;
    position: relative;
    background: #fafbfc;
  }
  .booking-number {
    position: absolute;
    top: -11px;
    left: 14px;
    background: #1a73e8;
    color: white;
    font-size: 13px;
    font-weight: 700;
    padding: 3px 14px;
    border-radius: 12px;
  }
  .copy-check {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding: 10px 12px;
    background: #e8f0fe;
    border-radius: 10px;
    font-size: 14px;
    color: #1a73e8;
    font-weight: 600;
    cursor: pointer;
  }
  .copy-check input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: #1a73e8;
  }

  /* Payment area inside booking */
  .slot-payment {
    border-top: 2px dashed #e0e0e0;
    margin-top: 14px;
    padding-top: 14px;
    background: #fffdf5;
    margin-left: -14px;
    margin-right: -14px;
    margin-bottom: -14px;
    padding: 14px;
    border-radius: 0 0 12px 12px;
  }
  .slot-payment .form-group input,
  .slot-payment .form-group select {
    background: white;
  }
  .slot-subtotal {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0 0;
    font-size: 15px;
  }
  .slot-subtotal .label { color: #888; }
  .slot-subtotal .value { font-weight: 800; color: #1a73e8; font-size: 17px; }

  /* Grand total */
  .grand-total-box {
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    border-radius: 14px;
    padding: 18px;
    color: white;
    margin-bottom: 12px;
  }
  .grand-total-box .gt-title {
    font-size: 13px;
    opacity: 0.8;
    margin-bottom: 4px;
  }
  .grand-total-box .gt-breakdown {
    font-size: 13px;
    opacity: 0.9;
    padding: 4px 0;
  }
  .grand-total-box .gt-amount {
    font-size: 28px;
    font-weight: 800;
    text-align: center;
    padding: 8px 0;
  }

  /* Buttons */
  .submit-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
    letter-spacing: 1px;
  }
  .submit-btn:active { opacity: 0.8; transform: scale(0.98); }
  .cancel-btn {
    width: 100%;
    padding: 14px;
    background: white;
    color: #999;
    border: 2px solid #e0e0e0;
    border-radius: 14px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
  }
  .next-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #4caf50, #2e7d32);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 1px;
  }
  .next-btn:active { opacity: 0.8; }

  /* Team selection */
  .tournament-select select {
    width: 100%;
    padding: 14px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 15px;
    background: #fafafa;
    -webkit-appearance: none;
  }
  .team-list { margin-top: 8px; }
  .team-card {
    background: white;
    border: 2px solid #e8eaed;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .team-card:active { background: #f0f4ff; }
  .team-card.selected {
    border-color: #1a73e8;
    background: #e8f0fe;
    box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
  }
  .team-card .team-info { flex: 1; }
  .team-card .team-name {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .team-card .team-rep {
    font-size: 13px;
    color: #666;
  }
  .team-card .team-check {
    width: 30px;
    height: 30px;
    border: 2px solid #ccc;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: white;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .team-card.selected .team-check {
    background: #1a73e8;
    border-color: #1a73e8;
  }

  /* Type selector */
  .type-selector {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .type-btn {
    flex: 1;
    padding: 12px 4px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    background: white;
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .type-btn.selected {
    border-color: #1a73e8;
    background: #1a73e8;
    color: white;
    box-shadow: 0 2px 8px rgba(26,115,232,0.3);
  }
  .type-btn .type-sub {
    font-size: 11px;
    font-weight: 400;
    opacity: 0.7;
    display: block;
    margin-top: 2px;
  }

  /* Confirm overlay */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    justify-content: center;
    align-items: flex-start;
    padding: 16px;
    overflow-y: auto;
  }
  .overlay.show { display: flex; }
  .confirm-box {
    background: white;
    border-radius: 18px;
    padding: 24px 20px;
    max-width: 440px;
    width: 100%;
    margin: auto;
  }
  .confirm-box h2 {
    font-size: 20px;
    text-align: center;
    margin-bottom: 20px;
    color: #1a73e8;
  }
  .confirm-team {
    text-align: center;
    background: #e8f0fe;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .confirm-team .ct-name {
    font-size: 22px;
    font-weight: 800;
    color: #333;
  }
  .confirm-team .ct-rep {
    font-size: 14px;
    color: #666;
    margin-top: 4px;
  }
  .confirm-booking {
    background: #f8f9fa;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .confirm-booking-title {
    font-size: 13px;
    font-weight: 700;
    color: #1a73e8;
    margin-bottom: 10px;
  }
  .confirm-booking-main {
    font-size: 20px;
    font-weight: 800;
    color: #333;
    margin-bottom: 4px;
  }
  .confirm-booking-detail {
    font-size: 15px;
    color: #555;
    line-height: 1.8;
  }
  .confirm-payment {
    background: #fff8e1;
    border: 2px solid #ffc107;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .confirm-payment .pay-row {
    display: flex;
    justify-content: space-between;
    font-size: 15px;
    padding: 4px 0;
  }
  .confirm-payment .pay-total {
    display: flex;
    justify-content: space-between;
    font-size: 24px;
    font-weight: 800;
    color: #1a73e8;
    border-top: 2px solid #e0c860;
    margin-top: 8px;
    padding-top: 10px;
  }
  .rep-confirm-box {
    background: #fff3e0;
    border: 2px solid #ff9800;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
    text-align: center;
  }
  .rep-confirm-box .rep-title {
    font-size: 13px;
    color: #e65100;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .rep-confirm-box .rep-name {
    font-size: 24px;
    font-weight: 800;
    color: #333;
    margin-bottom: 4px;
  }
  .rep-confirm-box .rep-email {
    font-size: 14px;
    color: #666;
    word-break: break-all;
  }
  .rep-confirm-box .rep-note {
    font-size: 11px;
    color: #999;
    margin-top: 8px;
  }
  .btn-send-rep {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #e65100, #d32f2f);
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 12px;
    letter-spacing: 1px;
  }
  .btn-send-rep:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .btn-send-rep .send-to {
    font-size: 12px;
    font-weight: 400;
    opacity: 0.9;
    display: block;
    margin-top: 4px;
  }

  /* Complete */
  .complete-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  .complete-screen.show { display: block; }
  .complete-screen .check-icon {
    width: 90px; height: 90px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    color: white;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  }
  .complete-screen .check-icon.success { background: #4caf50; }
  .complete-screen .check-icon.warning { background: #ff9800; }
  .complete-screen .check-icon.error { background: #d32f2f; }
  .complete-screen h2 { font-size: 22px; margin-bottom: 8px; }
  .complete-screen p { color: #888; font-size: 14px; margin-bottom: 16px; }
  .close-btn {
    padding: 16px 50px;
    background: #4caf50;
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: #1a73e8;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
    padding: 8px 0;
  }

  /* History */
  .history-btn {
    width: 100%;
    padding: 14px;
    background: white;
    color: #1a73e8;
    border: 2px solid #1a73e8;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .history-btn:active { background: #e8f0fe; }

  .history-card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border-left: 5px solid #4caf50;
  }
  .history-card.has-error { border-left-color: #ff9800; }
  .history-card.all-error { border-left-color: #d32f2f; }
  .history-card .hc-time {
    font-size: 12px;
    color: #999;
    margin-bottom: 4px;
  }
  .history-card .hc-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .history-card .hc-detail {
    font-size: 13px;
    color: #666;
    margin-bottom: 8px;
  }
  .history-card .hc-status {
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 8px;
    margin-bottom: 4px;
  }
  .hc-status.ok { background: #e8f5e9; color: #2e7d32; }
  .hc-status.ng { background: #fff3e0; color: #e65100; }
  .hc-status.fail { background: #ffebee; color: #c62828; }

  .resend-btn {
    width: 100%;
    padding: 12px;
    background: #ff9800;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
  }
  .resend-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .resend-btn:active { opacity: 0.8; }

  .error-guide {
    background: #fff8e1;
    border-radius: 10px;
    padding: 12px;
    margin-top: 10px;
    font-size: 13px;
    color: #5d4037;
    line-height: 1.6;
  }
  .error-code {
    font-size: 11px;
    color: #999;
    margin-top: 8px;
    font-family: monospace;
  }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px dashed #ddd;
    margin: 12px 0;
  }
</style>
</head>
<body>

<div class="container">

  <!-- ===== STEP 1: Team Selection ===== -->
  <div class="screen active" id="step1">
    <div class="header">
      <h1>即決予約システム</h1>
      <div class="badge">BOOKS</div>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <div class="steps">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>

    <!-- 履歴ボタン -->
    <button class="history-btn" id="historyBtn" onclick="showHistory()">&#128203; 送信履歴を見る</button>

    <div id="loadError" style="display:none;background:#ffebee;color:#c62828;padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:12px;"></div>

    <!-- 満枠リスト -->
    <div id="closingList" style="display:none;background:#fff0f0;border:2px solid #ef9a9a;border-radius:14px;padding:14px 16px;margin-bottom:12px;">
      <div style="font-size:15px;font-weight:700;color:#c62828;margin-bottom:10px;">満枠（即決で完売）</div>
      <div id="closingItems"></div>
    </div>

    <!-- 読み込み中メッセージ -->
    <div id="initialLoading" style="text-align:center;padding:60px 20px;">
      <div style="width:50px;height:50px;border:4px solid #e0e0e0;border-top:4px solid #1a73e8;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div>
      <div style="font-size:15px;color:#666;font-weight:600;">大会データを読み込み中...</div>
    </div>

    <!-- データ読み込み後に表示 -->
    <div id="mainContent" style="display:none;">

    <!-- Staff name -->
    <div class="section">
      <div class="section-title">&#128100; 入力者</div>
      <div class="form-group" style="margin-bottom:0">
        <input type="text" id="staffName" placeholder="あなたの名前を入力してください">
      </div>
    </div>

    <!-- Tournament select -->
    <div class="section">
      <div class="section-title">&#128197; 大会を選択 <span style="font-size:11px;font-weight:400;color:#999;margin-left:4px;">本日の大会のみ表示</span></div>
      <div class="tournament-select">
        <select id="tournamentSelect" onchange="loadTeams()">
        </select>
      </div>
    </div>

    <!-- Team list -->
    <div class="section">
      <div class="section-title">&#127936; チームを選択</div>
      <div class="team-list" id="teamList"></div>
    </div>

    <!-- Type selector -->
    <div class="section" id="typeSection" style="display:none">
      <div class="section-title">&#9889; 何枠の即決？</div>
      <div class="type-selector" id="typeSelector">
        <div class="type-btn selected" onclick="selectType(1)">1枠</div>
        <div class="type-btn" onclick="selectType(2)">2枠</div>
        <div class="type-btn" onclick="selectType(3)">3枠</div>
        <div class="type-btn" onclick="selectType(4)">4枠</div>
        <div class="type-btn" onclick="selectType(5)">5枠</div>
      </div>
    </div>

    <button class="next-btn" id="nextBtn" style="display:none" onclick="goToForm()">入力画面へ進む</button>
    </div><!-- /mainContent -->
  </div>

  <!-- ===== STEP 2: Input Form ===== -->
  <div class="screen" id="step2">
    <div class="back-link" onclick="goBack()">&#8592; 戻る</div>

    <div class="header">
      <h1>即決予約 入力フォーム</h1>
      <div class="badge" id="typeBadge">1枠</div>
    </div>

    <div class="steps">
      <div class="step-dot"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>

    <!-- Today's tournament info -->
    <div class="section">
      <div class="section-title">&#9917; 今回の大会</div>
      <div class="info-row">
        <span class="info-label">チーム名</span>
        <span class="info-value" id="dispTeam">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">代表者</span>
        <span class="info-value" id="dispRep">-</span>
      </div>
      <div class="form-group" style="margin-bottom:0;padding:10px 0;border-bottom:1px solid #f5f5f5;">
        <label style="font-size:13px;color:#999;font-weight:400;">メールアドレス <span class="req">必須</span></label>
        <input type="email" id="inputEmail" placeholder="例: sample@example.com" style="font-size:14px;padding:10px 12px;" inputmode="email" autocomplete="email">
        <div id="emailNote" style="font-size:11px;color:#999;margin-top:4px;"></div>
      </div>
      <div class="info-row">
        <span class="info-label">大会</span>
        <span class="info-value" id="dispTournament" style="font-size:12px">-</span>
      </div>
    </div>

    <!-- Booking slots -->
    <div class="section">
      <div class="section-title">&#128197; 次回予約を入力</div>
      <div id="bookingSlots"></div>
    </div>

    <!-- Total -->
    <div class="grand-total-box" id="totalSection">
      <div class="gt-title">お支払い合計</div>
      <div id="totalBreakdown"></div>
      <div class="gt-amount" id="dispGrandTotal">-</div>
    </div>

    <!-- 備考欄 -->
    <div class="section">
      <div class="section-title">&#128221; 備考 <span style="font-size:11px;font-weight:400;color:#999;margin-left:4px;">任意・メールには記載されません</span></div>
      <div class="form-group" style="margin-bottom:0">
        <textarea id="remarks" rows="3" placeholder="例：メアド変更 xxx@xxx.com&#10;　　代表者変更 山田→鈴木&#10;　　電話番号変更 090-xxxx-xxxx" style="width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;resize:vertical;font-family:inherit;"></textarea>
      </div>
    </div>

    <button class="submit-btn" onclick="showConfirm()">確認画面へ</button>
    <button class="cancel-btn" onclick="goBack()">キャンセル</button>
  </div>

  <!-- ===== STEP 3: Complete ===== -->
  <div class="screen" id="step3">
    <div class="steps">
      <div class="step-dot"></div>
      <div class="step-dot"></div>
      <div class="step-dot active"></div>
    </div>
    <div class="complete-screen show" id="completeScreen">
      <!-- 動的に中身を生成 -->
    </div>
  </div>

  <!-- ===== STEP 4: History ===== -->
  <div class="screen" id="step4">
    <div class="back-link" onclick="hideHistory()">&#8592; トップに戻る</div>
    <div class="header">
      <h1>送信履歴</h1>
      <div class="badge" id="historyCount">0件</div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button id="histDays0" onclick="switchHistoryDays(0)" style="flex:1;padding:8px;border:2px solid #1a73e8;border-radius:20px;background:#e8f0fe;color:#1a73e8;font-size:13px;font-weight:700;cursor:pointer">本日</button>
      <button id="histDays3" onclick="switchHistoryDays(3)" style="flex:1;padding:8px;border:2px solid #e0e0e0;border-radius:20px;background:#fff;color:#666;font-size:13px;font-weight:700;cursor:pointer">3日間</button>
    </div>
    <div id="historyList"></div>
    <button class="next-btn" onclick="hideHistory()" style="margin-top:12px;">&#65291; 新しい予約を入力する</button>
  </div>

</div>

<!-- Confirm overlay -->
<div class="overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h2>この内容で送信しますか？</h2>
    <div class="rep-confirm-box">
      <div class="rep-title">&#9888; この代表者に確認メールを送信します</div>
      <div class="rep-name" id="confirmRepName">-</div>
      <div class="rep-email" id="confirmRepEmail">-</div>
      <div class="rep-note">※ マスタDBから自動取得</div>
    </div>
    <div id="confirmContent"></div>
    <button class="cancel-btn" onclick="hideConfirm()" style="margin-top:0;margin-bottom:8px;">戻って修正</button>
    <button class="btn-send-rep" onclick="doSend()">
      代表者確認 - 送信する
      <span class="send-to" id="confirmSendTo">-</span>
    </button>
  </div>
</div>

<!-- Loading overlay (全画面) -->
<div id="loadingOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#ffffff;z-index:200;justify-content:center;align-items:center;flex-direction:column;">
  <div style="width:50px;height:50px;border:4px solid #e0e0e0;border-top:4px solid #1a73e8;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;"></div>
  <div id="loadingText" style="font-size:15px;color:#666;font-weight:600;">読み込み中...</div>
</div>

<script>
// ===== GAS API URL =====
const API_URL = 'https://script.google.com/macros/s/AKfycbzejwlaQBa4v1sWbDhWhiSHDt3ydAhyydu_3sLqFTVYaP2PY3de4fVxCfA1JNVgYOSX/exec';

let tournaments = [];
let selectedTeamIdx = -1;
let selectedType = 1;
let slotCount = 1;
let currentTournament = null;
let currentTeam = null;

// ===== 送信履歴 (API取得) =====
let cachedHistory = { items: [] };

function fetchHistory(callback) {
  fetch(API_URL + '?action=getHistory')
    .then(r => r.json())
    .then(data => {
      cachedHistory = data;
      updateHistoryBtnVisibility();
      if (callback) callback(data);
    })
    .catch(err => {
      console.error('履歴取得エラー:', err);
      if (callback) callback(cachedHistory);
    });
}

function getHistory() {
  return cachedHistory;
}

let currentHistoryDays = 0;

function updateHistoryBtnVisibility() {
  const btn = document.getElementById('historyBtn');
  if (cachedHistory.items.length > 0) {
    btn.textContent = '\u{1F4CB} 送信履歴を見る（' + cachedHistory.items.length + '件）';
  } else {
    btn.textContent = '\u{1F4CB} 送信履歴を見る';
  }
}

function switchHistoryDays(days) {
  currentHistoryDays = days;
  var btn0 = document.getElementById('histDays0');
  var btn3 = document.getElementById('histDays3');
  btn0.style.borderColor = days === 0 ? '#1a73e8' : '#e0e0e0';
  btn0.style.background = days === 0 ? '#e8f0fe' : '#fff';
  btn0.style.color = days === 0 ? '#1a73e8' : '#666';
  btn3.style.borderColor = days === 3 ? '#1a73e8' : '#e0e0e0';
  btn3.style.background = days === 3 ? '#e8f0fe' : '#fff';
  btn3.style.color = days === 3 ? '#1a73e8' : '#666';
  document.getElementById('historyList').innerHTML = '<div style="text-align:center;padding:40px;color:#999;">読み込み中...</div>';
  fetch(API_URL + '?action=getHistory&days=' + days)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      cachedHistory = data;
      renderHistory();
    })
    .catch(function() {
      document.getElementById('historyList').innerHTML = '<div style="text-align:center;padding:40px;color:#c62828;">取得失敗</div>';
    });
}

// ===== Init: GAS APIからデータ取得 =====
function init() {
  document.getElementById('initialLoading').style.display = 'block';
  document.getElementById('mainContent').style.display = 'none';
  updateHistoryBtnVisibility();
  fetch(API_URL + '?action=getTournaments')
    .then(r => r.json())
    .then(result => {
      document.getElementById('initialLoading').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      if (result.error) { showError(result.error); return; }
      tournaments = result.tournaments || [];
      if (tournaments.length === 0) {
        document.getElementById('teamList').innerHTML = '<div style="text-align:center;color:#999;padding:30px;">本日の大会データがありません</div>';
        return;
      }
      const select = document.getElementById('tournamentSelect');
      select.innerHTML = '';
      tournaments.forEach((t, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        const time = formatTime(t.time);
        opt.textContent = t.venue + ' / ' + t.name + ' / ' + time;
        select.appendChild(opt);
      });
      loadTeams();
    })
    .catch(err => {
      document.getElementById('initialLoading').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      showError('データの読み込みに失敗しました: ' + err.message);
    });
  // 満枠リストを並行取得
  loadClosingList();
}

function loadClosingList() {
  fetch(API_URL + '?action=getClosingList')
    .then(r => r.json())
    .then(d => {
      var closings = (d && d.closings) || [];
      if (!closings.length) return;
      var html = '';
      closings.forEach(function(c, idx) {
        if (idx > 0) html += '<div style="border-top:1px solid #ffcdd2;margin:6px 0 0;"></div>';
        html += '<div style="padding:6px 0;">';
        html += '<div style="display:flex;justify-content:space-between;align-items:baseline;"><span style="font-size:13px;color:#888;">' + (c.bookingDate || '') + ' &nbsp; ' + (c.bookingTime || '') + ' &nbsp; ' + (c.bookingLevel || '') + '</span><span style="font-size:11px;color:#aaa;white-space:nowrap;">' + (c.closedByStaff || '') + ' ' + (c.closedDate || '') + ' ' + (c.closedAt || '') + '</span></div>';
        html += '<div style="font-size:15px;font-weight:700;color:#1d1d1f;">' + (c.bookingVenue || '') + '</div>';
        html += '</div>';
      });
      document.getElementById('closingItems').innerHTML = html;
      document.getElementById('closingList').style.display = 'block';
    })
    .catch(function() {});
}

function showError(msg) {
  const el = document.getElementById('loadError');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}
function showLoading(text) {
  document.getElementById('loadingText').textContent = text || '処理中...';
  document.getElementById('loadingOverlay').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}

// ===== 時間表示のクリーンアップ =====
function formatTime(timeStr) {
  if (!timeStr) return '';
  if (/^\d{1,2}:\d{2}/.test(timeStr)) return timeStr;
  return timeStr.split('\u301c').map(function(part) {
    part = part.trim();
    if (!part) return '';
    var m = part.match(/(\d{1,2}:\d{2}:\d{2})/);
    if (m) return m[1].substring(0, 5);
    m = part.match(/(\d{1,2}:\d{2})/);
    if (m) return m[1];
    return part;
  }).join('\u301c');
}

function formatNow() {
  const d = new Date();
  return ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
}

// ===== Step 1 =====
function loadTeams() {
  selectedTeamIdx = -1;
  const tIdx = document.getElementById('tournamentSelect').value;
  const t = tournaments[tIdx];
  if (!t) return;
  const container = document.getElementById('teamList');

  let html = '';
  t.teams.forEach((team, i) => {
    html += '<div class="team-card" id="tc' + i + '" onclick="selectTeam(' + i + ')">';
    html += '<div class="team-info">';
    html += '<div class="team-name">' + team.team + '</div>';
    html += '<div class="team-rep">' + team.rep + '</div>';
    html += '<div class="team-rep" style="font-size:11px;color:#999">' + team.email + '</div>';
    html += '</div>';
    html += '<div class="team-check" id="tcheck' + i + '">&#10003;</div>';
    html += '</div>';
  });
  container.innerHTML = html || '<div style="text-align:center;color:#999;padding:20px;">チームがありません</div>';
  document.getElementById('typeSection').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
}

function selectTeam(idx) {
  selectedTeamIdx = idx;
  const cards = document.querySelectorAll('.team-card');
  cards.forEach((c, i) => c.classList.toggle('selected', i === idx));
  document.getElementById('typeSection').style.display = 'block';
  document.getElementById('nextBtn').style.display = 'block';
  document.getElementById('typeSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function selectType(n) {
  selectedType = n;
  slotCount = n;
  document.querySelectorAll('.type-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === n - 1);
  });
}

// ===== Step 2 =====
function goToForm() {
  if (selectedTeamIdx < 0) return;
  const staffName = document.getElementById('staffName').value.trim();
  if (!staffName) { alert('入力者の名前を入力してください'); return; }

  const tIdx = document.getElementById('tournamentSelect').value;
  currentTournament = tournaments[tIdx];
  currentTeam = currentTournament.teams[selectedTeamIdx];

  document.getElementById('dispTeam').textContent = currentTeam.team;
  document.getElementById('dispRep').textContent = currentTeam.rep;
  const emailInput = document.getElementById('inputEmail');
  emailInput.value = currentTeam.email || '';
  const emailNote = document.getElementById('emailNote');
  if (currentTeam.email) {
    emailInput.readOnly = true;
    emailInput.style.background = '#f0f0f0';
    emailInput.style.color = '#666';
    emailNote.textContent = '※ マスタDBから自動取得';
    emailNote.style.color = '#999';
  } else {
    emailInput.readOnly = false;
    emailInput.style.background = '#fafafa';
    emailInput.style.color = '#333';
    emailNote.textContent = '※ マスタDBにメールアドレスがありません。入力してください。';
    emailNote.style.color = '#d32f2f';
  }
  document.getElementById('dispTournament').textContent = currentTournament.date + ' ' + currentTournament.name;
  document.getElementById('typeBadge').textContent = slotCount + '枠';

  renderSlots();

  document.getElementById('step1').classList.remove('active');
  document.getElementById('step2').classList.add('active');
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.add('active');
  window.scrollTo(0, 0);
}

function renderSlots() {
  const container = document.getElementById('bookingSlots');
  let html = '';
  for (let i = 1; i <= slotCount; i++) {
    const showCopy = i > 1;
    html += '<div class="booking-block" id="block' + i + '">';
    html += '<div class="booking-number">予約' + i + '</div>';
    if (showCopy) {
      html += '<label class="copy-check">';
      html += '<input type="checkbox" id="copy' + i + '" onchange="applyCopy(' + i + ')">';
      html += '予約1と同じ内容をコピー</label>';
    }
    html += '<div id="fields' + i + '">';
    html += '<div class="form-group"><label>日付 <span class="req">必須</span></label>';
    html += '<input type="date" id="date' + i + '"></div>';
    html += '<div class="form-group"><label>会場 <span class="req">必須</span></label>';
    html += '<input type="text" id="venue' + i + '" placeholder="例: 品川区立総合体育館"></div>';
    html += '<div class="form-row">';
    html += '<div class="form-group"><label>受付時間 <span class="req">必須</span></label>';
    html += '<input type="text" id="time' + i + '" placeholder="例: 10:00"></div>';
    html += '<div class="form-group"><label>レベル <span class="req">必須</span></label>';
    html += '<input type="text" id="level' + i + '" placeholder="例: エンジョイ"></div>';
    html += '</div></div>';
    // Payment per slot
    html += '<div class="slot-payment">';
    html += '<div class="form-group"><label>金額（税込）<span class="req">必須</span></label>';
    html += '<input type="number" id="price' + i + '" placeholder="例: 17000" inputmode="numeric" oninput="calcTotal()"></div>';
    html += '<div class="form-group"><label>クーポン</label>';
    html += '<select id="coupon' + i + '" onchange="calcTotal()">';
    html += '<option value="0">なし</option>';
    html += '<option value="1000">1,000円引き</option>';
    html += '<option value="2000">2,000円引き</option>';
    html += '<option value="3000">3,000円引き</option>';
    html += '<option value="5000">5,000円引き</option>';
    html += '<option value="8000">8,000円引き</option>';
    html += '</select></div>';
    html += '<div class="slot-subtotal">';
    html += '<span class="label">この枠の小計</span>';
    html += '<span class="value" id="subtotal' + i + '">-</span>';
    html += '</div></div>';
    // 満枠チェックボックス
    html += '<label style="display:flex;align-items:center;gap:10px;margin-top:12px;padding:10px 12px;background:#fff0f0;border:2px solid #ffcdd2;border-radius:10px;font-size:14px;color:#c62828;font-weight:600;cursor:pointer;">';
    html += '<input type="checkbox" id="isLast' + i + '" style="width:20px;height:20px;accent-color:#d32f2f;">';
    html += '満枠（この大会の枠は終了）</label>';
    html += '</div>';
  }
  container.innerHTML = html;
  calcTotal();
}

function applyCopy(n) {
  const checked = document.getElementById('copy' + n).checked;
  const fields = ['date', 'venue', 'time', 'level'];
  fields.forEach(f => {
    const input = document.getElementById(f + n);
    if (checked) {
      input.value = document.getElementById(f + '1').value;
      input.classList.add('disabled');
      input.readOnly = true;
    } else {
      input.classList.remove('disabled');
      input.readOnly = false;
    }
  });
}

function calcTotal() {
  let grandTotal = 0;
  let breakdownHtml = '';

  for (let i = 1; i <= slotCount; i++) {
    const priceEl = document.getElementById('price' + i);
    const couponEl = document.getElementById('coupon' + i);
    const subtotalEl = document.getElementById('subtotal' + i);
    if (!priceEl) continue;

    const price = parseInt(priceEl.value) || 0;
    const discount = parseInt(couponEl.value) || 0;
    const subtotal = price - discount;

    if (subtotalEl) {
      subtotalEl.textContent = price ? '\u00a5' + subtotal.toLocaleString() : '-';
    }

    if (price) {
      breakdownHtml += '<div class="gt-breakdown">';
      breakdownHtml += '予約' + i + ': \u00a5' + price.toLocaleString();
      if (discount) breakdownHtml += ' (-\u00a5' + discount.toLocaleString() + ')';
      breakdownHtml += '</div>';
      grandTotal += subtotal;
    }
  }

  const breakdownEl = document.getElementById('totalBreakdown');
  if (breakdownEl) breakdownEl.innerHTML = breakdownHtml;

  const grandTotalEl = document.getElementById('dispGrandTotal');
  if (grandTotalEl) grandTotalEl.textContent = grandTotal ? '\u00a5' + grandTotal.toLocaleString() : '-';
}

// ===== Confirm =====
function showConfirm() {
  const inputEmail = document.getElementById('inputEmail').value.trim();
  if (!inputEmail || inputEmail.indexOf('@') < 1) {
    alert('メールアドレスを正しく入力してください。');
    document.getElementById('inputEmail').focus();
    return;
  }

  for (let i = 1; i <= slotCount; i++) {
    const date = document.getElementById('date' + i).value;
    const venue = document.getElementById('venue' + i).value.trim();
    const time = document.getElementById('time' + i).value.trim();
    const level = document.getElementById('level' + i).value.trim();
    const price = document.getElementById('price' + i).value;
    if (!date || !venue || !time || !level || !price) {
      alert('予約' + i + 'の入力が不足しています。\n全ての項目を入力してください。');
      return;
    }
  }

  document.getElementById('confirmRepName').textContent = currentTeam.rep;
  document.getElementById('confirmRepEmail').textContent = inputEmail;
  document.getElementById('confirmSendTo').textContent = currentTeam.rep + 'さん (' + inputEmail + ') へ送信';

  let html = '';

  html += '<div class="confirm-team">';
  html += '<div class="ct-name">' + currentTeam.team + '</div>';
  html += '<div class="ct-rep">代表者: ' + currentTeam.rep + ' 様</div>';
  html += '</div>';

  for (let i = 1; i <= slotCount; i++) {
    const dateVal = document.getElementById('date' + i).value || '未入力';
    const venueVal = document.getElementById('venue' + i).value || '未入力';
    const timeVal = document.getElementById('time' + i).value || '未入力';
    const levelVal = document.getElementById('level' + i).value || '未入力';

    let dateDisplay = dateVal;
    if (dateVal && dateVal !== '未入力') {
      const d = new Date(dateVal);
      const weekdays = ['日','月','火','水','木','金','土'];
      dateDisplay = (d.getMonth()+1) + '月' + d.getDate() + '日（' + weekdays[d.getDay()] + '）';
    }

    html += '<div class="confirm-booking">';
    if (slotCount > 1) html += '<div class="confirm-booking-title">予約' + i + '</div>';
    html += '<div class="confirm-booking-main">' + dateDisplay + '</div>';
    html += '<div class="confirm-booking-detail">';
    html += venueVal + '<br>';
    html += timeVal + '\u301c / ' + levelVal;
    if (document.getElementById('isLast' + i).checked) html += '<br><span style="color:#c62828;font-weight:700;font-size:13px;">満枠（この大会の枠は終了）</span>';
    html += '</div></div>';
  }

  html += '<div class="confirm-payment">';
  for (let i = 1; i <= slotCount; i++) {
    const price = parseInt(document.getElementById('price' + i).value) || 0;
    const discount = parseInt(document.getElementById('coupon' + i).value) || 0;
    if (price) {
      html += '<div class="pay-row"><span>予約' + i + '</span><span>\u00a5' + price.toLocaleString();
      if (discount) html += ' <span style="color:#d32f2f;font-size:12px">(-\u00a5' + discount.toLocaleString() + ')</span>';
      html += '</span></div>';
    }
  }
  html += '<div class="pay-total"><span>合計額</span><span>' + document.getElementById('dispGrandTotal').textContent + '</span></div>';
  html += '</div>';

  const remarks = (document.getElementById('remarks').value || '').trim();
  if (remarks) {
    html += '<div style="background:#fff3e0;border-radius:10px;padding:12px 14px;margin-bottom:12px;">';
    html += '<div style="font-size:12px;color:#e65100;font-weight:700;margin-bottom:4px;">\u{1F4DD} 備考（社内用・メールには記載されません）</div>';
    html += '<div style="font-size:14px;color:#333;white-space:pre-wrap;">' + remarks.replace(/</g,'&lt;') + '</div>';
    html += '</div>';
  }

  html += '<div style="text-align:center;font-size:13px;color:#888;margin-bottom:8px;">入力者: ' + document.getElementById('staffName').value + '</div>';

  document.getElementById('confirmContent').innerHTML = html;
  document.getElementById('confirmOverlay').classList.add('show');
}

function hideConfirm() {
  document.getElementById('confirmOverlay').classList.remove('show');
}

// ===== Send =====
let isSending = false;
let lastFormData = null; // 再送用に保持

function doSend() {
  if (isSending) return;
  isSending = true;
  const sendBtn = document.querySelector('.btn-send-rep');
  sendBtn.disabled = true;
  sendBtn.textContent = '送信中...';

  showLoading('送信中...');
  hideConfirm();

  const couponLabels = { '0': 'なし', '1000': '1,000円引き', '2000': '2,000円引き', '3000': '3,000円引き', '5000': '5,000円引き', '8000': '8,000円引き' };
  const bookings = [];
  let grandTotal = 0;
  for (let i = 1; i <= slotCount; i++) {
    const price = parseInt(document.getElementById('price' + i).value) || 0;
    const couponVal = document.getElementById('coupon' + i).value;
    const discount = parseInt(couponVal) || 0;
    const subtotal = price - discount;
    grandTotal += subtotal;
    bookings.push({
      date: document.getElementById('date' + i).value,
      venue: document.getElementById('venue' + i).value,
      time: document.getElementById('time' + i).value,
      level: document.getElementById('level' + i).value,
      price: price, couponValue: couponVal, couponLabel: couponLabels[couponVal] || 'なし',
      discount: discount, subtotal: subtotal,
    });
  }

  // 満枠フラグを文字列で送る
  var lastFlags = '';
  for (var li = 1; li <= slotCount; li++) {
    lastFlags += document.getElementById('isLast' + li).checked ? '1' : '0';
  }
  while (lastFlags.length < 5) lastFlags += '0';

  const enteredEmail = document.getElementById('inputEmail').value.trim();
  const formData = {
    staffName: document.getElementById('staffName').value,
    slotCount: slotCount,
    team: currentTeam.team, rep: currentTeam.rep,
    phone: currentTeam.phone, email: enteredEmail,
    tournamentId: currentTeam.tournamentId || '',
    tournamentName: currentTournament.name, venue: currentTournament.venue,
    bookings: bookings, grandTotal: grandTotal,
    remarks: (document.getElementById('remarks').value || '').trim(),
    lastFlags: lastFlags,
  };

  lastFormData = formData;

  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(formData),
  })
  .then(r => r.json())
  .then(results => {
    hideLoading();
    isSending = false;

    const cwOk = results.cw === 'OK';
    const emailOk = results.email === 'OK' || (results.email+'').startsWith('スキップ');
    const emailSkipped = (results.email+'').startsWith('スキップ');

    // 履歴をリフレッシュ（DBに記録済みなのでAPIから再取得）
    fetchHistory();

    // 完了画面を表示
    showCompleteScreen(cwOk, emailOk, emailSkipped, results, formData);

    document.getElementById('step2').classList.remove('active');
    document.getElementById('step3').classList.add('active');
    window.scrollTo(0, 0);
  })
  .catch(err => {
    hideLoading();
    isSending = false;

    // 通信エラー（パターン4）: DBにも記録されていないのでリフレッシュ不要

    showCompleteScreen(false, false, false, null, formData, true);

    document.getElementById('step2').classList.remove('active');
    document.getElementById('step3').classList.add('active');
    window.scrollTo(0, 0);
  });
}

// ===== 完了画面: 4パターン =====
function showCompleteScreen(cwOk, emailOk, emailSkipped, results, formData, isNetworkError) {
  const screen = document.getElementById('completeScreen');
  const now = formatNow();
  const d = new Date();
  const today = d.getFullYear() + '/' + ('0'+(d.getMonth()+1)).slice(-2) + '/' + ('0'+d.getDate()).slice(-2);
  let html = '';

  if (cwOk && emailOk) {
    // パターン1: 全部成功
    html += '<div class="check-icon success">&#10003;</div>';
    html += '<h2>送信完了！</h2>';
    html += '<p>予約の登録と<br>お客様へのメール送信が<br>完了しました</p>';
    html += '<p style="color:#333;font-size:13px;background:#f0f0f0;padding:12px;border-radius:10px;margin-bottom:16px;">';
    html += '<strong>' + formData.rep + '</strong>さん<br>';
    html += '<span style="font-size:12px;color:#666">' + formData.email + '</span><br>へメール送信済み</p>';
    html += '<button class="close-btn" onclick="goToHistoryFromComplete()" style="margin-top:16px;">送信履歴を見る</button>';
    html += '<button class="cancel-btn" onclick="goToTop()">トップに戻る</button>';

  } else if (cwOk && !emailOk) {
    // パターン2: CW成功 + メール失敗
    html += '<div class="check-icon warning">&#9888;</div>';
    html += '<h2>予約の登録はできました！</h2>';
    html += '<p>お客様へのメールだけ<br>うまく送れませんでした</p>';
    html += '<p style="color:#2e7d32;font-size:14px;font-weight:700;margin-bottom:16px;">予約自体は登録済みなので<br>ご安心ください</p>';
    html += '<p style="font-size:13px;color:#888;margin-bottom:8px;">事務局に自動で通知済みです</p>';
    html += '<button class="close-btn" onclick="goToHistoryFromComplete()">送信履歴からメールを再送する</button>';
    html += '<button class="cancel-btn" onclick="goToTop()" style="margin-top:8px;">トップに戻る</button>';

  } else if (!cwOk && emailOk) {
    // パターン3: CW失敗 + メール成功
    html += '<div class="check-icon warning">&#9651;</div>';
    html += '<h2>お客様へのメールは<br>送れました</h2>';
    html += '<p>社内への登録がうまくいきませんでしたが<br>事務局に自動で通知済みです</p>';
    html += '<p style="color:#2e7d32;font-size:14px;font-weight:700;margin-bottom:16px;">お客様側は問題ありません<br>そのまま次の対応へ進んでください</p>';
    html += '<button class="close-btn" onclick="goToHistoryFromComplete()" style="margin-top:16px;">送信履歴を見る</button>';
    html += '<button class="cancel-btn" onclick="goToTop()">トップに戻る</button>';

  } else {
    // パターン4: 両方失敗（通信エラー含む）
    html += '<div class="check-icon error">&#10005;</div>';
    html += '<h2>送信できませんでした</h2>';
    html += '<p>電波が届きにくい場所かもしれません<br>場所を変えてもう一度お試しください</p>';
    html += '<button class="close-btn" onclick="goToTop()" style="margin-top:16px;background:#d32f2f;">もう一度やり直す</button>';
  }

  screen.innerHTML = html;
}

// ===== メール再送（履歴画面から） =====
function resendEmailFromHistory(historyIdx) {
  const history = getHistory();
  const entry = history.items[historyIdx];
  if (!entry) { alert('送信データがありません'); return; }

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '送信中...';

  // DBの履歴データから再送に必要な情報を組み立て
  const resendData = {
    action: 'resendEmail',
    team: entry.team,
    rep: entry.rep,
    email: entry.email,
    phone: entry.phone || '',
    tournamentName: entry.tournamentName || '',
    venue: entry.venue || '',
    slotCount: entry.slotCount || 1,
    staffName: entry.staffName || '',
    rowIndex: entry.rowIndex, // DB行番号（結果更新用）
  };

  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(resendData),
  })
  .then(r => r.json())
  .then(results => {
    if (results.email === 'OK') {
      btn.textContent = '送信できました！';
      btn.style.background = '#4caf50';
      // 2秒後にDBから履歴リフレッシュ
      setTimeout(() => fetchHistory(() => renderHistory()), 2000);
    } else {
      btn.textContent = '送れませんでした...';
      btn.style.background = '#d32f2f';
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = 'もう一度メールを送る';
        btn.style.background = '#ff9800';
      }, 2000);
    }
  })
  .catch(err => {
    btn.textContent = '通信エラー...';
    btn.style.background = '#d32f2f';
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'もう一度メールを送る';
      btn.style.background = '#ff9800';
    }, 2000);
  });
}

// ===== 履歴画面 =====
function showHistory() {
  document.getElementById('step1').classList.remove('active');
  document.getElementById('step4').classList.add('active');
  // APIから最新履歴を取得して表示
  renderHistory(); // まず現在のキャッシュで表示
  fetchHistory(() => renderHistory()); // API取得後に再描画
  window.scrollTo(0, 0);
}

function hideHistory() {
  document.getElementById('step4').classList.remove('active');
  document.getElementById('step1').classList.add('active');
  window.scrollTo(0, 0);
}

function goToHistoryFromComplete() {
  document.getElementById('step3').classList.remove('active');
  document.getElementById('step4').classList.add('active');
  renderHistory();
  fetchHistory(() => renderHistory());
  window.scrollTo(0, 0);
}

function goToTop() {
  // step3やstep4からトップへ
  document.getElementById('step3').classList.remove('active');
  document.getElementById('step4').classList.remove('active');
  document.getElementById('step1').classList.add('active');
  // フォーム状態リセット
  isSending = false;
  lastFormData = null;
  window.scrollTo(0, 0);
}

function renderHistory() {
  const history = getHistory();
  const list = document.getElementById('historyList');
  document.getElementById('historyCount').textContent = history.items.length + '件';

  if (history.items.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#999;padding:40px;">まだ送信履歴がありません</div>';
    return;
  }

  let html = '';
  let lastDate = '';
  history.items.forEach((item, idx) => {
    // 3日間モード時は日付ヘッダーを表示
    if (currentHistoryDays > 0 && item.date && item.date !== lastDate) {
      lastDate = item.date;
      html += '<div style="font-size:13px;font-weight:700;color:#1a73e8;padding:12px 0 6px;border-bottom:1px solid #e0e0e0;margin-bottom:8px">' + item.date + '</div>';
    }
    const allOk = item.cwOk && item.emailOk;
    const allFail = !item.cwOk && !item.emailOk;
    const cardClass = allOk ? '' : (allFail ? ' all-error' : ' has-error');

    html += '<div class="history-card' + cardClass + '">';
    html += '<div class="hc-time">' + item.time + ' 送信</div>';
    html += '<div class="hc-name">' + item.rep + '様 / ' + item.team + '</div>';
    html += '<div class="hc-detail">' + item.slotCount + '枠 / ' + item.email + '</div>';

    // ステータス
    if (item.cwOk) {
      html += '<div class="hc-status ok">&#10003; 予約登録OK</div>';
    } else {
      html += '<div class="hc-status fail">&#10005; 予約登録エラー</div>';
    }

    const emailSkipped = item.emailSkipped || (item.emailDetail && item.emailDetail.indexOf('スキップ') === 0);
    if (emailSkipped) {
      html += '<div class="hc-status" style="background:#f0f0f0;color:#999;">- メールなし（アドレス未設定）</div>';
    } else if (item.emailOk) {
      html += '<div class="hc-status ok">&#10003; メール送信OK</div>';
    } else {
      html += '<div class="hc-status fail">&#10005; メール送信エラー</div>';
    }

    // メール再送ボタン（成功時も「届いてない場合」として表示）
    if (!emailSkipped && item.email) {
      if (item.emailOk) {
        html += '<button class="resend-btn" onclick="resendEmailFromHistory(' + idx + ')" style="background:#1a73e8;">お客様に届いてない場合: メールを再送</button>';
        html += '<div style="font-size:11px;color:#999;margin-top:4px;">※ 予約の二重登録にはなりません</div>';
      } else {
        html += '<button class="resend-btn" onclick="resendEmailFromHistory(' + idx + ')">もう一度メールを送る</button>';
      }
    }

    // エラー時は事務局通知済みを表示
    if (!item.cwOk || (!item.emailOk && !emailSkipped)) {
      html += '<div style="font-size:12px;color:#888;margin-top:6px;padding:8px;background:#f5f5f5;border-radius:8px;">事務局に自動で通知済みです</div>';
    }

    html += '</div>';
  });

  list.innerHTML = html;
}
